```html
<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="description"
        content="Academic Writing Composer"
    >

    <meta
        name="theme-color"
        content="#2563eb"
    >

    <title>Academic Writing Composer</title>

    <link
        rel="icon"
        href="./favicon.ico"
    >

    <link
        rel="stylesheet"
        href="./assets/css/reset.css"
    >

    <link
        rel="stylesheet"
        href="./assets/css/variables.css"
    >

    <link
        rel="stylesheet"
        href="./assets/css/layout.css"
    >

    <link
        rel="stylesheet"
        href="./assets/css/components.css"
    >

    <link
        rel="stylesheet"
        href="./assets/css/editor.css"
    >

    <link
        rel="stylesheet"
        href="./assets/css/app.css"
    >

</head>

<body>

    <div id="loading-screen">

        <h2>Academic Writing Composer</h2>

        <p>Loading...</p>

    </div>

    <div id="app"></div>

    <noscript>

        <div
            style="
                padding:24px;
                font-family:sans-serif;
                text-align:center;
            "
        >
            JavaScript harus diaktifkan untuk menjalankan Academic Writing Composer.
        </div>

    </noscript>

    <script type="module">

        import App from "./src/ui/App.js";

        async function bootstrap() {

            try {

                const app = new App();

                await app.init();

                window.AWC = app;

                document
                    .getElementById("loading-screen")
                    ?.remove();

            }

            catch (error) {

                console.error(error);

                document.body.innerHTML = `
                    <div style="
                        display:flex;
                        justify-content:center;
                        align-items:center;
                        flex-direction:column;
                        height:100vh;
                        font-family:sans-serif;
                        gap:12px;
                    ">
                        <h2>Application Error</h2>
                        <p>${error.message}</p>
                    </div>
                `;

            }

        }

        bootstrap();

    </script>

</body>

</html>
```
