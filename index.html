<!DOCTYPE html>

    <meta charset="UTF-8">

        name="viewport"

        content="#2563eb"
    >

    <title>Academic Writing Composer</title>

    <link
        rel="stylesheet"
        href="./assets/css/reset.css"
    >

    <link

    >

    <link

    >

    <link

    >

    <link

        href="./assets/css/editor.css"
    >

    <link
        rel="stylesheet"
        href="./assets/css/app.css"
    >

</head>

<body>

    <div id="loading-screen">

        <h1>Academic Writing Composer</h1>

        <p>Loading...</p>

    </div>

    <div id="app"></div>

    <noscript>

        JavaScript harus diaktifkan.

    </noscript>

    <script type="module">

        import App from "./ui/App.js";

        async function bootstrap() {

            console.log("STEP 1 : bootstrap()");

            try {

                console.log("STEP 2 : new App()");

                const app = new App();

                window.AWC = app;

                console.log("STEP 3 : app.init()");

                await app.init();

                console.log("STEP 4 : remove loading");

                document
                    .getElementById("loading-screen")
                    ?.remove();

                console.log("STEP 5 : DONE");

            }

            catch (error) {

                console.error(error);

                console.error(error.stack);

                document.body.innerHTML = `
                    <div style="
                        padding:40px;
                        font-family:monospace;
                        white-space:pre-wrap;
                        color:#b00020;
                    ">
<h2>Application Error</h2>

${error.stack}
                    </div>
                `;

            }

        }

        bootstrap();

    </script>

</body>

</html>
